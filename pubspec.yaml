name: refchecker_desktop
description: A Flutter desktop UI for the RefChecker BibTeX verification backend.
publish_to: "none"
version: 1.2.0-beta.1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSansSC-OFL.txt
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Variable.ttf
